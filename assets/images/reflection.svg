<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 10 430 340">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" markerWidth="10" markerHeight="8"
            refX="10" refY="3.5" orient="auto">
      <polyline points="0,0 10,3.5 0,7" fill="none" stroke="#ddd" stroke-width="1.2"
                stroke-linejoin="miter"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect x="15" y="10" width="430" height="340" fill="#1a1a1a" rx="6"/>

  <!-- Concave surface (bows LEFT, concave from interior/right side) -->
  <path d="M 120,40 Q 55,180 120,320" stroke="#888" stroke-width="2.5" fill="none"/>

  <!-- Tangent line (dashed, vertical through P) -->
  <line x1="88" y1="55" x2="88" y2="310"
        stroke="#555" stroke-width="1.3" stroke-dasharray="8,6"/>

  <!-- Normal vector n (from P pointing right, into interior) -->
  <line x1="94" y1="180" x2="330" y2="180"
        stroke="#ddd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Incoming ray d (from upper-right to P) -->
  <line x1="420" y1="55" x2="94" y2="178"
        stroke="#ddd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Reflected ray r (from P to lower-right) -->
  <line x1="88" y1="182" x2="418" y2="305"
        stroke="#ddd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Point P -->
  <circle cx="88" cy="180" r="3.5" fill="#ddd"/>

  <!-- P label (to the left of P) -->
  <text x="63" y="178" font-size="17" font-style="italic"
        font-family="Georgia,serif" fill="#ddd">P</text>

  <!-- n label with vector arrow -->
  <text x="335" y="175" font-size="17" font-style="italic"
        font-family="Georgia,serif" fill="#ddd">n</text>
  <line x1="335" y1="163" x2="348" y2="163" stroke="#ddd" stroke-width="1"/>
  <polyline points="348,163 344,160.5 344,165.5" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- d label with vector arrow (above the ray) -->
  <text x="280" y="88" font-size="17" font-style="italic"
        font-family="Georgia,serif" fill="#ddd">d</text>
  <line x1="279" y1="76" x2="292" y2="76" stroke="#ddd" stroke-width="1"/>
  <polyline points="292,76 288,73.5 288,78.5" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- r label with vector arrow (above the ray, same x as d) -->
  <text x="280" y="247" font-size="17" font-style="italic"
        font-family="Georgia,serif" fill="#ddd">r</text>
  <line x1="279" y1="235" x2="292" y2="235" stroke="#ddd" stroke-width="1"/>
  <polyline points="292,235 288,232.5 288,237.5" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Tangente label (left of dashed line) -->
  <text x="30" y="52" font-size="12" font-style="italic"
        font-family="Georgia,serif" fill="#666">Tangente</text>
</svg>
